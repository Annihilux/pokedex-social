<nav class="navbar">
  <div class="inner">
    <a routerLink="/" class="brand">pokedex-social</a>

    <div class="links">
      <a routerLink="/">Home</a>
      <a routerLink="/pokemons">Pokémons</a>
      <a *ngIf="auth.isAuthenticated()" routerLink="/favorites">Favoritos</a>
      <a *ngIf="auth.isAdmin()" routerLink="/admin/users">Admin: Usuarios</a>
      <a *ngIf="auth.isAdmin()" routerLink="/admin/content">Admin: Contenido</a>
    </div>

    <div class="auth">
      <ng-container *ngIf="!auth.isAuthenticated(); else logged">
        <a routerLink="/login">Login</a>
        <a routerLink="/register">Registro</a>
      </ng-container>

      <ng-template #logged>
        <span class="role">{{ auth.profile()?.role }}</span>
        <button type="button" (click)="logout()">Logout</button>
      </ng-template>
    </div>
  </div>
</nav>

<nav class="navbar">
  <div class="inner">
    <a routerLink="/" class="brand">pokedex-social</a>

    <div class="links">
      <a routerLink="/">Home</a>
      <a routerLink="/pokemons">Pok&eacute;mons</a>
      @if (auth.isAuthenticated()) {
        <a routerLink="/favorites">Favoritos</a>
        <a routerLink="/profile">Perfil</a>
      }
      @if (auth.isAdmin()) {
        <a routerLink="/admin/users">Admin: Usuarios</a>
      }
      @if (auth.isAdmin()) {
        <a routerLink="/admin/content">Admin: Contenido</a>
      }
    </div>

    <div class="auth">
      @if (!auth.isAuthenticated()) {
        <a routerLink="/login">Login</a>
        <a routerLink="/register">Registro</a>
      } @else {
        <img
          class="avatar-thumb"
          [src]="avatar.resolveAvatarUrl(auth.profile()?.avatar_url)"
          alt="Avatar del usuario"
        />
        <button type="button" (click)="logout()">Logout</button>
      }
    </div>
  </div>
</nav>

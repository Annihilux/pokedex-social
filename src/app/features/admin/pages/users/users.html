<div class="header">
  <div>
    <h2>Admin · Usuarios</h2>
    <p class="muted">Gestiona roles (user/admin) desde la tabla profiles.</p>
  </div>
  <button type="button" (click)="load()">Recargar</button>
</div>

@if (loading()) {
  <p>Cargando...</p>
}

@if (errorMsg()) {
  <p>{{ errorMsg() }}</p>
}

@if (!loading() && !errorMsg()) {
  <div class="card">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Email</th>
          <th>Rol</th>
          <th style="width: 260px;">Acciones</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let u of users()">
          <td class="email">{{ u.email }}</td>
          <td>
            <span class="pill" [class.admin]="u.role === 'admin'">
              {{ u.role }}
            </span>
          </td>
          <td class="actions">
            <button
              type="button"
              (click)="setRole(u, 'user')"
              [disabled]="savingId() === u.user_id || u.role === 'user'">
              Hacer user
            </button>

            <button
              type="button"
              class="primary"
              (click)="setRole(u, 'admin')"
              [disabled]="savingId() === u.user_id || u.role === 'admin'">
              Hacer admin
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  @if (users().length === 0) {
    <p class="muted">No hay usuarios.</p>
  }
  </div>
}

<div class="card auth-card">
  <h2>Registro</h2>
  <p class="muted">Crea tu cuenta para guardar favoritos y participar con comentarios.</p>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label>Username</label>
      <input type="text" formControlName="username" placeholder="Tu username" />
      @if (form.get('username')?.touched && form.get('username')?.invalid) {
        <small>El username es obligatorio (min. 3 caracteres).</small>
      }
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" formControlName="email" placeholder="tu@email.com" />
    </div>

    <div class="field">
      <label>Contraseña</label>
      <input type="password" formControlName="password" placeholder="Mínimo 6 caracteres" />
    </div>

    <div class="field">
      <label>Confirmar contraseña</label>
      <input type="password" formControlName="confirmPassword" placeholder="Repite la contraseña" />
    </div>

    <div class="actions">
      <button class="primary" type="submit" [disabled]="loading()">
        {{ loading() ? 'Registrando...' : 'Registrarse' }}
      </button>
      <a class="btn" routerLink="/login">Ya tengo cuenta</a>
    </div>

    @if (errorMsg()) {
      <p>{{ errorMsg() }}</p>
    }
    @if (successMsg()) {
      <p>{{ successMsg() }}</p>
    }
  </form>
</div>

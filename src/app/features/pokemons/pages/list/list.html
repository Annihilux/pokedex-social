<div class="header">
  <h2>Pokémons</h2>

  <input
    type="text"
    placeholder="Buscar por nombre o id..."
    (input)="setQuery($any($event.target).value)"
  />
</div>

<p *ngIf="loading()">Cargando...</p>
<p *ngIf="errorMsg()">{{ errorMsg() }}</p>

<div class="grid" *ngIf="!loading() && !errorMsg()">
  <a class="card pokemon" *ngFor="let p of filtered()" [routerLink]="['/pokemons', p.id]">
    <img [src]="spriteUrl(p.id)" [alt]="p.name" loading="lazy" />
    <div class="info">
      <div class="name">{{ p.name }}</div>
      <div class="muted">#{{ p.id }}</div>
    </div>
  </a>
</div>

<p class="muted" *ngIf="!loading() && !errorMsg() && filtered().length === 0">
  No hay resultados.
</p>

<div class="pager">
  <button (click)="prevPage()" [disabled]="loading() || offset() === 0">Anterior</button>
  <button (click)="nextPage()" [disabled]="loading()">Siguiente</button>
</div>

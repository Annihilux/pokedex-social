<a routerLink="/favorites">&#8592; Volver</a>

@if (loading()) {
  <p>Cargando...</p>
}

@if (errorMsg()) {
  <p>{{ errorMsg() }}</p>
}

@if (!loading() && favorite(); as f) {
  <div>
    <h2>Editar favorito #{{ f.id }}</h2>
    <p><strong>Pok&eacute;mon:</strong> #{{ f.pokemon_id }} - {{ f.pokemon_name }}</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        Nota (solo admin)
        <input type="text" formControlName="note" />
      </label>

      <button type="submit" [disabled]="saving()">
        {{ saving() ? 'Guardando...' : 'Guardar cambios' }}
      </button>

      @if (successMsg()) {
        <p>{{ successMsg() }}</p>
      }
      @if (errorMsg()) {
        <p>{{ errorMsg() }}</p>
      }
    </form>
  </div>
}

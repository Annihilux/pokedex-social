<a routerLink="/favorites">← Volver</a>

<p *ngIf="loading()">Cargando...</p>
<p *ngIf="errorMsg()">{{ errorMsg() }}</p>

<div *ngIf="!loading() && favorite() as f">
  <h2>Editar favorito #{{ f.id }}</h2>
  <p><strong>Pokémon:</strong> #{{ f.pokemon_id }} - {{ f.pokemon_name }}</p>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <label>
      Nota (solo admin)
      <input type="text" formControlName="note" />
    </label>

    <button type="submit" [disabled]="saving()">
      {{ saving() ? 'Guardando...' : 'Guardar cambios' }}
    </button>

    <p *ngIf="successMsg()">{{ successMsg() }}</p>
    <p *ngIf="errorMsg()">{{ errorMsg() }}</p>
  </form>
</div>

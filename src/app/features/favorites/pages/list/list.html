<div class="header">
  <h2>Mis Favoritos</h2>
</div>

@if (loading()) {
  <p>Cargando...</p>
}

@if (errorMsg()) {
  <p>{{ errorMsg() }}</p>
}

@if (!loading() && !errorMsg()) {
  <div class="grid">
    <div class="card fav" *ngFor="let f of favorites()">
      <a class="quick-link" [routerLink]="['/pokemons', f.pokemon_id]">
        <img
          class="sprite"
          [src]="spriteUrl(f.pokemon_id)"
          [alt]="'Pokemon #' + f.pokemon_id"
          loading="lazy"
        />
        <div class="name">Pokemon #{{ f.pokemon_id }}</div>
      </a>

      <div class="actions">
        <a class="btn" [routerLink]="['/pokemons', f.pokemon_id]">Ver detalle</a>
        <button
          type="button"
          (click)="remove(f.pokemon_id)"
          [disabled]="removingId() === f.pokemon_id"
        >
          {{ removingId() === f.pokemon_id ? 'Quitando...' : 'Quitar' }}
        </button>
      </div>
    </div>
  </div>
}

@if (!loading() && !errorMsg() && favorites().length === 0) {
  <p class="muted">No tienes favoritos todav&iacute;a.</p>
}
